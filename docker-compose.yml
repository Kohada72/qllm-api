services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/src
    ports:
      - "8000:8000"
    env_file: .env

  gui:
    build:
      context: .
      dockerfile: gui/Dockerfile
    volumes:
      - .:/src
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api


